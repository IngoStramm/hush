name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon package
        run: |
          mkdir -p package/Hush
          cp Hush.toc package/Hush/
          cp Hush.lua package/Hush/
          cd package
          zip -r ../Hush.zip Hush

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hush
          path: Hush.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Hush.zip
